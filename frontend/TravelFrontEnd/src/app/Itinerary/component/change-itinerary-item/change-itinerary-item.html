<div class="header" [style.background-image]="'url(' + imageUrl + ')'">
  <input (change)="uploadImage($event)" type="file" class="upload-input" id="coverUpload">
  <label for="coverUpload" class="upload-btn">上傳檔案</label>

  <div class="header-card">
    <h2>{{title}}</h2>
    <p>{{date}}</p>
  </div>
</div>

<div class="main-content" cdkDropListGroup>
  <div class="days-container">
    @for (day of days; track day.day; let dayIdx = $index) {
    <div class="day-column">
      <div class="day-header">天數(第{{ day.day }}天)</div>

      <div class="items-list" cdkDropList [cdkDropListData]="day.items" (cdkDropListDropped)="onDrop($event)">

        @for (item of day.items; track $index) {
        <div class="itinerary-card" cdkDrag>
          <div class="card-row">
            <div class="time-box">
              <input type="time" [(ngModel)]="item.startTime">
            </div>
            <div class="info-box">
              <div class="attraction-name">{{ item.attractionName }}</div>
              <div class="address">{{ item.address }}</div>
            </div>
            <div class="sort-handle" cdkDragHandle>☰</div>
          </div>
          <div class="card-footer">
            <span class="detail-link">詳細資訊</span>
            <button class="btn-delete" (click)="deleteItem(day, $index)">刪除</button>
          </div>
        </div>
        }
      </div>
      <button (click)="openSearchModal(day)">+ 新增單筆行程</button>
    </div>
    }
  </div>

  <div class="side-actions">
    <!-- (click)="saveSnapshot()" -->
    <button class="btn-primary">儲存快照</button>
    <button class="btn-secondary">查看過去版本</button>
  </div>
</div>

@if(showSearchModal){
<div class="my-modal">
  <div class="modal-body">
    <h3>搜尋地點</h3>
    <input #searchInput type="text" class="form-control" placeholder="請輸入景點...">
    <button (click)="showSearchModal = false">取消</button>
  </div>
</div>
}
