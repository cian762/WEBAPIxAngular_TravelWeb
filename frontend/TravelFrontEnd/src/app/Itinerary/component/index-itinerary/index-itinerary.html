<!-- ── Page Section ───────────────────────────── -->
<section class="create-section">

  <!-- Background decorative shapes -->
  <div class="bg-blob bg-blob-1"></div>
  <div class="bg-blob bg-blob-2"></div>
  <div class="bg-grid"></div>

  <div class="container position-relative">

    <!-- Eyebrow label -->
    <div class="section-eyebrow">開始你的旅程</div>

    <!-- Section heading -->
    <h2 class="section-heading">建立新行程</h2>
    <p class="section-sub">填寫基本資訊，讓 AI 為你規劃完美旅程</p>

    <!-- ── Card ─────────────────────────────── -->
    <div class="itinerary-card">

      <!-- Card inner glow line -->
      <div class="card-glow-line"></div>

      <!-- ── Row 1: Trip Name ──────────────── -->
      <div class="field-group">
        <label class="field-label">
          <span class="label-icon">📍</span>行程名稱
        </label>
        <div class="input-wrap">
          <input type="text" class="field-input field-input-lg" placeholder="例如：台北一日遊、東京五日深度遊…"
            [(ngModel)]="ItineraryName" />
        </div>
      </div>

      <!-- ── Row 2: Date Range ─────────────── -->
      <div class="field-row">
        <div class="field-group">
          <label class="field-label">
            <span class="label-icon">🗓</span>開始時間
          </label>
          <div class="input-wrap">
            <input type="datetime-local" [(ngModel)]="startDateTime" class="field-input" />
          </div>
        </div>

        <div class="field-divider">→</div>

        <div class="field-group">
          <label class="field-label">
            <span class="label-icon">🏁</span>結束時間
          </label>
          <div class="input-wrap">
            <input type="datetime-local" [(ngModel)]="endDateTime" class="field-input" />
          </div>
        </div>
      </div>

      <!-- ── Row 3: Location ───────────────── -->
      <div class="field-group">
        <label class="field-label">
          <span class="label-icon">🗺</span>地點
        </label>
        <div class="input-wrap input-wrap-icon">
          <span class="input-prefix-icon">📌</span>
          <input type="text" #locationInput class="field-input field-input-lg has-prefix"
            placeholder="輸入地點（支援 Google 地圖自動完成）" [(ngModel)]="location" />
        </div>
        <span class="field-hint">支援城市、景點、地標等關鍵字搜尋</span>
      </div>

      <!-- ── Divider ───────────────────────── -->
      <div class="card-divider"></div>

      <!-- ── Buttons ───────────────────────── -->
      <div class="btn-row">

        <button type="button" (click)="createByAI()" class="btn-itinerary btn-ai">
          <span class="btn-icon">🤖</span>
          <span class="btn-text">
            <span class="btn-title">AI 智慧建立</span>
            <span class="btn-desc">自動規劃景點與時程</span>
          </span>
          <span class="btn-arrow">→</span>
        </button>

        <button type="button" (click)="createTrip()" class="btn-itinerary btn-create">
          <span class="btn-icon">➕</span>
          <span class="btn-text">
            <span class="btn-title">手動建立行程</span>
            <span class="btn-desc">自行安排每日行程</span>
          </span>
          <span class="btn-arrow">→</span>
        </button>

      </div>

    </div>
    <!-- ── /Card ─────────────────────────── -->

    <!-- Trust badges -->
    <div class="trust-row">
      <span class="trust-badge">🔒 資料安全加密</span>
      <span class="trust-badge">☁️ 雲端自動儲存</span>
      <span class="trust-badge">📱 支援所有裝置</span>
    </div>

  </div>
</section>
