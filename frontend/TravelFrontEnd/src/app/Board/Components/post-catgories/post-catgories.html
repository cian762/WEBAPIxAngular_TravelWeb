<div class="single-sidebar-widget post-category-widget">
  <h4 class="category-title"><i class="ri-calendar-2-line"></i> 近期活動</h4>
  <ul class="cat-list">
    @for (activity of newActivityList; track $index) {
    <li>
      <a (click)="goToActivityInfo(activity.activityId)" class="d-flex justify-content-between">
        <p>{{activity.title}}</p>
      </a>
    </li>
    }
  </ul>
</div>
