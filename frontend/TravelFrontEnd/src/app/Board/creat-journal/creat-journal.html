<div class="host-body">
  <div class="d-flex justify-content-evenly">
    <div>
      <button type="button" class="btn btn-primary" (click)="onSave()">儲存</button>
    </div>

    <div class="ground">
      @for (item of itemBox; track item.id; let i = $index) {
      <div class="cube" [style.width.px]="item.width" [style.height.px]="item.height"
        [style.z-index]="itemBox.length - i" [style.left.px]="item.x" [style.top.px]="item.y"
        (mousedown)="startDrag($event, item)">

        <div class="controller top-left"
          (mousedown)="startResize($event, 'top-left', item.id); $event.stopPropagation()">
        </div>
        <div class="controller top-right"
          (mousedown)="startResize($event, 'top-right', item.id); $event.stopPropagation()"></div>
        <div class="controller bottom-left"
          (mousedown)="startResize($event, 'bottom-left', item.id); $event.stopPropagation()"></div>
        <div class="controller bottom-right"
          (mousedown)="startResize($event, 'bottom-right', item.id); $event.stopPropagation()"></div>
        @if (item.type===1) {
        <img [src]="item.content" width="100%" height="100%">
        }
        @else if (item.type===0) {
        <textarea class="box-textarea">{{item.content}}</textarea>
        }

      </div>
      }
    </div>
    <div class=" right-panel">
      <div class="panel-card">
        <div class="panel-card-header">
          <h5 class="panel-card-title">圖片列</h5>
          <button class="upload-btn" (click)="triggerListUpload(1)" title="上傳圖片">
            <i class="ri-upload-2-line"></i>
          </button>
          <button class="upload-btn" (click)="triggerListUpload(0)" title="新增文字"></button>
          <input #listFileInput type="file" accept="image/*" multiple style="display:none"
            (change)="onFileSelected($event)" />
        </div>
        <!-- 空白提示 -->
        @if (imageFileList.length === 0) {
        <div class="list-empty" CdkDropList>
          <i class="ri-image-line list-empty-icon"></i>
          <p>尚無圖片</p>
        </div>}

        @else {
        <!-- 圖片表格 -->
        <table class="table table-hover img-table">
          <thead>
            <tr>
              <th>圖層</th>
              <th>圖檔</th>
              <th></th>
            </tr>
          </thead>
          <tbody cdkDropList cdkDropList [cdkDropListData]="itemBox" (cdkDropListDropped)="drop($event)">
            <!-- (click)="insertFromList(item)"  *ngFor="let item of imageList; let i = index" [class.row-active]="selectedImageId === item.id"
              title="點擊插入編輯器"-->
            @for (item of itemBox; track item.id; let i = $index) {
            <tr cdkDrag>
              <td class="td-index">{{$index}}</td>
              <td class="td-thumb">
                <img [src]="item.content" class="row-thumb" />
                <span class="row-name"></span>
              </td>
              <td class="td-action">
                <button class="row-delete" (click)="removeFromList(item.id, $event)" title="移除">
                  <i class="ri-close-line"></i>
                </button>
              </td>
            </tr>}
          </tbody>
        </table>}

      </div>
    </div>
  </div>
</div>
