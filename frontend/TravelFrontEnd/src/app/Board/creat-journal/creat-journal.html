<div class="host-body">
  <div class="d-flex justify-content-evenly">


    <!-- 左欄 -->
    <div class=" right-panel">
      <div class="panel-card">
        <div class="panel-card-header">
          <h5 class="panel-card-title">文章詳情</h5>
        </div>
        <div class="panel-card-body">
          <!-- 標題 -->
          <div class="mb-3">
            <label class="form-label">標題</label>
            <input type="text" class="form-control" [(ngModel)]="journalUpdate.title" placeholder="請輸入標題">
          </div>

          <!-- 封面 -->
          <div class="mb-3">
            <label class="form-label">封面</label>
            <img [src]="journalUpdate.cover" class="img-fluid-size d-block mb-2">
            <input type="file" accept="image/*" (change)="onCoverSelected($event)">
          </div>

          <!-- 標註地區 -->
          <div class="mb-3">
            <label class="form-label">標註地區</label>
            <select class="form-select" [(ngModel)]="journalUpdate.regionId">
              <!-- @for (region of regions; track region.id) {
              <option [value]="region.id">{{ region.name }}</option>
              } -->
            </select>
          </div>

          <!-- 文章權限 -->
          <div class="mb-3">
            <label class="form-label">文章權限</label>
            <select class="form-select" [(ngModel)]="journalUpdate.status">
              <option [value]="0">公開</option>
              <option [value]="1">私人</option>
            </select>
          </div>

          <!-- 刪除 -->
          <div class="mb-3">
            <button type="button" class="btn btn-danger w-100" (click)="onDelete()">刪除文章</button>
          </div>

          <!-- 儲存 -->
          <button type="button" class="btn btn-primary w-100" (click)="onSave()">儲存</button>
        </div>


      </div>
    </div>


    <!-- 中欄 -->
    <div class="ground">
      @for (item of itemBoxs; track item.id;) {
      <div class="cube" [style.width.px]="item.width" [style.height.px]="item.height"
        [style.z-index]="itemBoxs.length - item.zIndex" [style.left.px]="item.x" [style.top.px]="item.y"
        (mousedown)="startDrag($event, item)">

        <div class="controller top-left"
          (mousedown)="startResize($event, 'top-left', item.id); $event.stopPropagation()">
        </div>
        <div class="controller top-right"
          (mousedown)="startResize($event, 'top-right', item.id); $event.stopPropagation()"></div>
        <div class="controller bottom-left"
          (mousedown)="startResize($event, 'bottom-left', item.id); $event.stopPropagation()"></div>
        <div class="controller bottom-right"
          (mousedown)="startResize($event, 'bottom-right', item.id); $event.stopPropagation()"></div>
        @if (item.type===1) {
        <img [src]="item.content" width="100%" height="100%">
        }
        @else if (item.type===0) {
        <textarea class="box-textarea">{{item.content}}</textarea>
        }

      </div>
      }
    </div>


    <!-- 右欄 -->
    <div class=" right-panel">
      <div class="panel-card">
        <div class="panel-card-header">
          <h5 class="panel-card-title">物件箱</h5>
          <button class="upload-btn" (click)="triggerListUpload(1)" title="上傳圖片">
            <i class="ri-upload-2-line"></i>
          </button>
          <button class="upload-btn" (click)="triggerListUpload(0)" title="新增文字"></button>
          <input #listFileInput type="file" accept="image/*" multiple style="display:none"
            (change)="onFileSelected($event)" />
        </div>
        <!-- 空白提示 -->
        @if (itemBoxs.length === 0) {
        <div class="list-empty" CdkDropList>
          <i class="ri-image-line list-empty-icon"></i>
          <p>尚無物件</p>
        </div>}

        @else {
        <!-- 圖片表格 -->
        <table class="table table-hover img-table">
          <thead>
            <tr>
              <th>圖層</th>
              <th>圖檔</th>
              <th></th>
            </tr>
          </thead>
          <tbody cdkDropList cdkDropList [cdkDropListData]="itemBoxs" (cdkDropListDropped)="drop($event)">
            @for (item of itemBoxs; track item.id; let i = $index) {
            <tr cdkDrag>
              <td class="td-index">{{$index}}</td>
              <td class="td-thumb">
                <img [src]="item.content" class="row-thumb" />
                <span class="row-name"></span>
              </td>
              <td class="td-action">
                <button class="row-delete" (click)="removeFromList(item.id, $event)" title="移除">
                  <i class="ri-close-line"></i>
                </button>
              </td>
            </tr>}
          </tbody>
        </table>}

      </div>
    </div>







  </div>
</div>
