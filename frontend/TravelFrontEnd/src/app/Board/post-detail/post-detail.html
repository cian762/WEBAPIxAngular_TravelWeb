<!-- Start post-content Area -->
<section class="post-content-area single-post-area">
  <div class="container">
    <div class="row">
      <div class="col-lg-8 posts-list">
        <!-- 內文區在這 -->
        <div class="single-post row">
          <div class="col-lg-12">
            <div class="feature-img">
              <div class="mb-3">
                <div class="custom-slider-container">
                  <div class="main-display cover-upload-container">
                    <img class="img-fluid fade-in" [src]="allPhotoList[selectedIndex]">
                  </div>
                  <div class="thumb-nav">
                    @for (img of allPhotoList; track $index) {
                    <div class="thumb-item" [class.active]="$index === selectedIndex" (click)="setIndex($index)">
                      <img [src]="img">
                    </div>
                    }
                  </div>
                </div>
              </div>
            </div>
          </div>

          <div class="col-lg-3  col-md-3 meta-details">
            <ul class="tags">
              @for (tag of TagsList; track $index)
              {
              <li><a (click)="seachTag(tag)"><i [class]="tag.icon"></i>{{tag.tagName}}, </a></li>
              }
            </ul>
            <div class="user-details row">
              <p class="user-name col-lg-12 col-md-12 col-6"><a href="#">{{post?.authorName}}</a> <span
                  class="lnr lnr-user"></span></p>
              <p class="date col-lg-12 col-md-12 col-6"><a href="#">{{post?.createdAt}}</a> <span
                  class="lnr lnr-calendar-full"></span></p>
              <p class="view col-lg-12 col-md-12 col-6"><a href="#">1.2M Views</a> <span class="lnr lnr-eye"></span></p>
              <p class="comments col-lg-12 col-md-12 col-6"><a href="#">06 Comments</a> <span
                  class="lnr lnr-bubble"></span></p>
              <ul class="social-links col-lg-12 col-md-12 col-6">
                <li><a href="#"><i class="fa fa-facebook"></i></a></li>
                <li><a href="#"><i class="fa fa-twitter"></i></a></li>
                <li><a href="#"><i class="fa fa-github"></i></a></li>
                <li><a href="#"><i class="fa fa-behance"></i></a></li>
              </ul>
            </div>
          </div>

          <div class="col-lg-9 col-md-9">
            <h3 class="mt-20 mb-20">{{post?.title}}</h3>
            <p class="excert">
              {{post?.contents}}
            </p>
          </div>
        </div>
        <!-- 內文區結束 -->
        <div class="navigation-area">
          <div class="row">
            <div class="col-lg-6 col-md-6 col-12 nav-left flex-row d-flex justify-content-start align-items-center">
              <div class="thumb">
                <a href="#"><img class="img-fluid" src="img/blog/prev.jpg" alt=""></a>
              </div>
              <div class="arrow">
                <a href="#"><span class="lnr text-white lnr-arrow-left"></span></a>
              </div>
              <div class="detials">
                <p>Prev Post</p>
                <a href="#">
                  <h4>Space The Final Frontier</h4>
                </a>
              </div>
            </div>
            <div class="col-lg-6 col-md-6 col-12 nav-right flex-row d-flex justify-content-end align-items-center">
              <div class="detials">
                <p>Next Post</p>
                <a href="#">
                  <h4>Telescopes 101</h4>
                </a>
              </div>
              <div class="arrow">
                <a href="#"><span class="lnr text-white lnr-arrow-right"></span></a>
              </div>
              <div class="thumb">
                <a href="#"><img class="img-fluid" src="img/blog/next.jpg" alt=""></a>
              </div>
            </div>
          </div>
        </div>
        <app-comments-area [id]="id"></app-comments-area>
      </div>
      <div class="col-lg-4 sidebar-widgets" app-sidebar [post]="post"></div>
    </div>
  </div>
</section>
<!-- End post-content Area -->
