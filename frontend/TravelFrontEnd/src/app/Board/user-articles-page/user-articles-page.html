<div class="host-body">
  <!-- 用戶資訊起點 -->
  <div class="d-flex flex-column justify-content-center align-items-center">
    <div class="user-info ">
      <img class="user-avatar m-3" [src]="curUser.avatarUrl">
      <h3 class="text-center">{{curUser.name}}</h3>
      <p class="text-center m-3">{{totalCount}}篇文章</p>
      <div class="btn-user-group dropup">
        <button class="btn-follow" [class.btn-following]="isFollowing" [class.btn-unfollow]="!isFollowing"
          (click)="ToFollow()">
          {{ isFollowing ? '已追蹤' : '追蹤' }}
        </button>
        <button class="btn-user-more" data-bs-toggle="dropdown" aria-expanded="false"><i
            class="ri-more-2-fill"></i></button>
        <ul class="dropdown-menu">
          <li><a class="dropdown-item" (click)="toBlock()">封鎖</a></li>
          <li><a class="dropdown-item" href="#">分享用戶主頁</a></li>
          <li><a class="dropdown-item" href="#">複製用戶主頁連結</a></li>
        </ul>
      </div>

    </div>
    <app-article-list class="col-lg-8" [articleList]="articleList"
      (tagSelected)="onTagSelected($event)"></app-article-list>
  </div>
