<div class="container mt-5 mb-5">
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">

      <div class="card shadow-lg border-0 rounded-4 mt-5">

        <!-- 卡片標題 -->
        <div class="card-header text-white text-center py-4 border-0 rounded-top-4" style="background-color: #5b73e8;">
          <h3 class="mb-0 fw-bold"><i class="bi bi-shield-lock me-2"></i>重設密碼</h3>
        </div>

        <div class="card-body p-4 p-md-5">

          <!-- 說明文字 -->
          <div class="alert alert-info rounded-3 mb-4 shadow-sm border-0 bg-light text-dark">
            <p class="mb-0 small">我們已將 <strong>4 位數驗證碼</strong> 寄送至以下信箱：</p>
            <p class="mb-0 fw-bold text-primary fs-6 mt-1">{{ targetEmail }}</p>
          </div>

          <!-- 錯誤訊息提示 -->
          <div *ngIf="errorMessage" class="alert alert-danger rounded-3 fw-bold shadow-sm border-0">
            <i class="bi bi-exclamation-triangle-fill me-2"></i>{{ errorMessage }}
          </div>

          <!-- 重設表單 -->
          <form [formGroup]="resetForm" (ngSubmit)="onSubmit()">

            <!-- 驗證碼輸入框 -->
            <div class="mb-4">
              <label class="form-label fw-bold text-secondary">請輸入信件中的 4 位數驗證碼</label>
              <div class="input-group shadow-sm">
                <span class="input-group-text bg-light border-end-0"><i class="bi bi-123 text-muted"></i></span>
                <input type="text" class="form-control form-control-lg border-start-0 ps-0 bg-white text-center fw-bold letter-spacing-2"
                       formControlName="code" placeholder="0000" maxlength="4"
                       [ngClass]="{ 'is-invalid': f['code'].touched && f['code'].invalid }" />
              </div>
              <div *ngIf="f['code'].touched && f['code'].errors?.['required']" class="text-danger small mt-1">驗證碼為必填</div>
              <div *ngIf="f['code'].touched && (f['code'].errors?.['minlength'] || f['code'].errors?.['maxlength'])" class="text-danger small mt-1">請輸入完整的 4 位數驗證碼</div>
            </div>

            <!-- 新密碼輸入框 -->
            <div class="mb-4">
              <label class="form-label fw-bold text-secondary">設定新密碼</label>
              <div class="input-group shadow-sm">
                <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock text-muted"></i></span>
                <input type="password" class="form-control form-control-lg border-start-0 ps-0 bg-white"
                       formControlName="newPassword" placeholder="英數混合，至少8碼"
                       [ngClass]="{ 'is-invalid': f['newPassword'].touched && f['newPassword'].invalid }" />
              </div>
              <div *ngIf="f['newPassword'].touched && f['newPassword'].errors?.['required']" class="text-danger small mt-1">新密碼為必填</div>
              <div *ngIf="f['newPassword'].touched && f['newPassword'].errors?.['minlength']" class="text-danger small mt-1">密碼至少需 8 碼</div>
              <div *ngIf="f['newPassword'].touched && f['newPassword'].errors?.['pattern']" class="text-danger small mt-1">密碼必須為英數混合</div>
            </div>

            <!-- 確認新密碼輸入框 -->
            <div class="mb-4">
              <label class="form-label fw-bold text-secondary">再次輸入新密碼</label>
              <div class="input-group shadow-sm">
                <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock-fill text-muted"></i></span>
                <input type="password" class="form-control form-control-lg border-start-0 ps-0 bg-white"
                       formControlName="confirmPassword" placeholder="請再次輸入新密碼"
                       [ngClass]="{ 'is-invalid': f['confirmPassword'].touched && f['confirmPassword'].invalid }" />
              </div>
              <div *ngIf="f['confirmPassword'].touched && f['confirmPassword'].errors?.['passwordMismatch']" class="text-danger small mt-1">兩次輸入的密碼不一致！</div>
            </div>

            <!-- 確認按鈕 -->
            <button type="submit" class="btn btn-primary btn-lg w-100 rounded-pill shadow-sm fw-bold mt-2 mb-4"
              [disabled]="isLoading" style="background-color: #5b73e8; border-color: #5b73e8;">
              <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-2"></span>
              {{ isLoading ? '處理中...' : '確認重設密碼' }}
            </button>

            <!-- 返回登入連結 -->
            <div class="text-center pt-3 border-top">
              <a routerLink="/login" class="text-decoration-none small fw-bold text-muted hover-primary">
                <i class="bi bi-arrow-left me-1"></i> 想起來了？返回登入
              </a>
            </div>

          </form>
        </div>
      </div>

    </div>
  </div>
</div>

<style>
  .letter-spacing-2 { letter-spacing: 0.5rem; }
  .hover-primary:hover { color: #5b73e8 !important; }
</style>
