<div class="container mt-4">

  <table class="table table-hover">
    <thead class="table-dark">
      <tr>
        <th>訂單編號</th>
        <th>下單日期</th>
        <th>總金額</th>
        <th>訂單狀態</th>
        <th>訂單詳細</th>
        <th>付款狀態</th>
      </tr>
    </thead>
    <tbody>
      <ng-container *ngFor="let order of orders">
        <tr>
          <td>#{{ order.orderId }}</td>
          <td>{{ order.createdAt | date:'yyyy/MM/dd HH:mm' }}</td>
          <td>${{ order.totalAmount | number }}</td>
          <td>
            <span class="badge" [ngClass]="getStatusBadge(order.orderStatus)">
              {{ order.orderStatus }}
            </span>
          </td>
          <td>
            <button class="btn btn-sm btn-outline-primary" (click)="toggleDetail(order)">
              {{ order.isExpanded ? '收合' : '詳情' }}
            </button>

          </td>
          <td>
            <button *ngIf="order.orderStatus === '待處理'" class="btn btn-sm btn-success ms-2"
              (click)="onRepay(order.orderId)">
              前往付款
            </button>

          </td>
        </tr>

        <tr *ngIf="order.isExpanded">
          <td colspan="5" class="bg-light p-3">
            <div class="card shadow-sm">
              <div class="card-body">
                <h6>商品細項：</h6>
                <div *ngIf="order.details; else loading">
                  <div *ngFor="let item of order.details.items" class="d-flex border-bottom py-2 align-items-center">
                    <img [src]="item.productImage" style="width: 50px; height: 50px; object-fit: cover;"
                      class="me-3 rounded">
                    <div class="flex-grow-1">
                      <strong>{{ item.productName }}</strong> x {{ item.quantity }}
                    </div>
                    <div class="text-end">
                      <div *ngFor="let t of item.tickets">
                        {{ t.ticketName }}: ${{ t.unitPrice | number }}
                      </div>
                    </div>
                  </div>
                </div>
                <ng-template #loading>
                  <p>讀取中...</p>
                </ng-template>
              </div>
            </div>
          </td>
        </tr>
      </ng-container>
    </tbody>
  </table>
</div>
