<div class="search-hero py-5 mb-5 shadow-sm">
  <div class="container text-center mt-5">
    <br>
    <br>
    <br>
    <h1 class="display-6 fw-bold text-white mb-4 mt-5">尋找您的下一個夢想旅程</h1>

    <div class="row g-2 justify-content-center bg-white p-3 rounded-pill shadow-lg mx-auto" style="max-width: 800px;">
      <div class="col-md-5">
        <input type="text" class="form-control border-0 px-4 py-2" [(ngModel)]="query.keyword" placeholder="想去哪裡？">
      </div>

      <div class="col-md-4 border-start">
        <select class="form-select border-0 px-4 py-2" [(ngModel)]="query.regionId">
          <option [ngValue]="undefined">所有地區</option>
          <option *ngFor="let r of regions" [ngValue]="r.regionId">{{ r.regionName }}</option>
        </select>
      </div>

      <div class="col-md-3">
        <button class="btn btn-primary w-100 rounded-pill py-2 fw-bold" (click)="onSearch()">
          <i class="bi bi-search me-2"></i>搜尋行程
        </button>
      </div>
    </div>
  </div>
</div>

<div class="container mt-4">
  <div class="d-flex flex-wrap justify-content-center gap-2 mb-2">
    <button class="btn btn-outline-primary rounded-pill px-4" [class.active]="query.tagIds?.length === 0"
      (click)="query.tagIds = []; onSearch()">全部</button>

    <button *ngFor="let t of tags | slice:0:(isExpanded ? tags.length : displayLimit)"
      class="btn btn-outline-secondary rounded-pill px-4" [class.active]="query.tagIds?.includes(t.tagId)"
      (click)="toggleTag(t.tagId)">
      {{ t.tagName }}
    </button>

    <button *ngIf="tags.length > displayLimit" class="btn btn-link text-decoration-none ms-2" (click)="toggleExpand()">
      {{ isExpanded ? '收起 ▲' : '更多主題 ▼' }}
    </button>
  </div>


  <hr class="my-4 opacity-25">

  <div class="row g-4">
    <div *ngFor="let p of products" class="col-12 col-md-6 col-lg-3">
      <div class="card h-100 border-0 shadow-sm trip-card" (click)="viewDetail(p.tripProductId)">
        <div class="position-relative">
          <img [src]="p.coverImage" class="card-img-top object-fit-cover" style="height: 200px;" [alt]="p.productName">
          <span class="badge bg-dark position-absolute bottom-0 start-0 m-2 opacity-75">
            {{ p.regionName }}
          </span>
        </div>

        <div class="card-body d-flex flex-column">
          <h5 class="card-title fw-bold text-dark mb-1">{{ p.productName }}</h5>
          <p class="text-muted small mb-3">
            <i class="bi bi-clock me-1"></i>{{ p.durationDays }} 天行程
          </p>

          <div class="mt-auto d-flex justify-content-between align-items-end">
            <div>
              <span class="text-secondary small">TWD</span>
              <div class="h5 fw-bold text-danger mb-0">{{ p.displayPrice | number }} 起</div>
            </div>
            <button class="btn btn-outline-primary btn-sm rounded-pill px-3">查看詳情</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <nav class="mt-5 mb-5 d-flex flex-column align-items-center">
    <p class="text-muted small mb-3">共找到 {{ totalCount }} 筆行程</p>
    <ul class="pagination">
      <li class="page-item" [class.disabled]="query.page <= 1">
        <a class="page-link" (click)="onPageChange(query.page - 1)">上一頁</a>
      </li>
      <li class="page-item active"><a class="page-link">{{ query.page }}</a></li>
      <li class="page-item" [class.disabled]="query.page * query.pageSize >= totalCount">
        <a class="page-link" (click)="onPageChange(query.page + 1)">下一頁</a>
      </li>
    </ul>
  </nav>
</div>
