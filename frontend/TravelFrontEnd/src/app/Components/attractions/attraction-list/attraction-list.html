<!-- 景點列表頁 -->

<!-- 麵包屑 -->
<div class="breadcrumb-bar">
  <div class="container">
    <a routerLink="/">首頁</a>
    <span class="sep">›</span>
    <a routerLink="/attractions">景點</a>
    <span class="sep">›</span>
    <span class="current">{{ cityName }}</span>
  </div>
</div>

<!-- 城市介紹區塊（從城市點進來且有靜態資料時顯示） -->
<div class="city-intro-block" *ngIf="!isFromTag && cityIntro">
  <!-- Banner 圖片：全寬 -->
  <div class="city-intro__banner">
    <img [src]="cityIntro.image" [alt]="cityName" class="city-intro__banner-img">
  </div>
  <!-- 文字內容：置中 -->
  <div class="city-intro__content-wrap">
    <h2 class="city-intro__city-name">{{ cityName }}</h2>
    <h3 class="city-intro__heading">{{ cityIntro.heading }}</h3>
    <p class="city-intro__para" *ngFor="let para of cityIntro.paragraphs">{{ para }}</p>
    <p class="city-intro__para" *ngIf="cityIntro.link">
      更多旅遊資訊，詳見
      <a [href]="cityIntro.link.url" target="_blank" class="city-intro__link">{{ cityIntro.link.label }}</a>。
    </p>
  </div>
</div>

<!-- Tag 標題（只有從 tag 點進來才顯示） -->
<div class="tag-title-bar" *ngIf="isFromTag">
  <div class="container">
    <h2 class="tag-title">{{ cityName }}</h2>
    <a routerLink="/attractions/tags" class="tags-link-top">
      景點標籤列表 <span class="tag-hash">#</span>
    </a>
  </div>
</div>

<!-- ===== 觀光景點 ===== -->
<ng-container *ngIf="activeTab === 'attractions'">

  <!-- 類型 Tab -->
  <div class="type-nav" *ngIf="!isFromTag">
    <div class="container">
      <div class="type-nav__inner">
        <button *ngFor="let t of customTabs; let i = index" class="type-btn" [class.active]="activeTabIdx === i"
          (click)="switchCustomTab(i)">
          <span class="type-btn__icon">{{ t.icon }}</span>
          <span class="type-btn__name">{{ t.label }}</span>
        </button>
      </div>
    </div>
  </div>

  <!-- 搜尋列 -->
  <div class="search-bar">
    <div class="container">
      <div class="search-bar__top">
        <div class="search-bar__inner">
          <input type="text" [(ngModel)]="keyword" (keyup.enter)="onSearch()" placeholder="搜尋景點名稱..."
            class="search-bar__input">
          <button class="search-bar__btn" (click)="onSearch()">
            <i class="fa fa-search"></i>
          </button>
        </div>
      </div>
      <p class="result-hint" *ngIf="!loading">
        共找到 <strong>{{ attractions.length }}</strong> 個景點
      </p>
    </div>
  </div>

  <!-- 景點卡片 -->
  <section class="list-section">
    <div class="container">

      <!-- Loading -->
      <div class="loading-box" *ngIf="loading">
        <div class="spinner-border text-warning" role="status"></div>
        <p>載入中...</p>
      </div>

      <!-- 無資料 -->
      <div class="empty-box" *ngIf="!loading && attractions.length === 0">
        <p>找不到符合條件的景點，請嘗試其他分類</p>
      </div>

      <!-- 卡片格 -->
      <div class="row g-4" *ngIf="!loading && attractions.length > 0">
        <div class="col-xl-3 col-lg-4 col-md-6" *ngFor="let a of attractions">
          <div class="att-card" (click)="goToDetail(a)">

            <!-- 圖片 -->
            <div class="att-card__img-wrap">
              <img [src]="getMainImage(a)" [alt]="a.name"
                onerror="this.src='https://placehold.co/400x300?text=No+Image';this.onerror=null;">
              <div class="att-card__view-badge">
                <i class="fa fa-eye"></i> {{ a.viewCount | number }}
              </div>
            </div>

            <!-- 內容 -->
            <div class="att-card__body">
              <h5 class="att-card__title">{{ a.name }}</h5>

              <div class="att-card__types" *ngIf="a.types?.length">
                <span class="badge-type" *ngFor="let t of a.types"
                  (click)="selectType(t.attractionTypeId, t.attractionTypeName); $event.stopPropagation()">
                  {{ t.attractionTypeName }}
                </span>
              </div>

            </div>

          </div>
        </div>
      </div>

    </div>
  </section>

</ng-container>
