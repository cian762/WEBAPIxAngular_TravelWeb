<!-- 景點首頁 -->

<!-- ===== Hero 輪播 ===== -->
<section class="att-hero-carousel">

  <!-- 輪播圖片層 -->
  <div class="carousel-slides">
    <div class="carousel-slide"
         *ngFor="let slide of heroSlides; let i = index"
         [class.active]="currentSlide === i">
      <img [src]="slide" alt="景點輪播">
    </div>
  </div>

  <!-- 暗色遮罩 + 標題文字 -->
  <div class="carousel-overlay">
    <h1 class="carousel-title">觀 光 景 點</h1>
    <p class="carousel-sub">探索台灣之美，200+ 精選景點等你發現</p>
  </div>

  <!-- 左右箭頭 -->
  <button class="carousel-arrow carousel-arrow--prev" (click)="prevSlide()">&#8249;</button>
  <button class="carousel-arrow carousel-arrow--next" (click)="nextSlide()">&#8250;</button>

  <!-- 圓點指示器 -->
  <div class="carousel-dots">
    <button *ngFor="let s of heroSlides; let i = index"
            class="carousel-dot"
            [class.active]="currentSlide === i"
            (click)="goToSlide(i)">
    </button>
  </div>

</section>

<!-- 主內容 -->
<section class="att-main">
  <div class="container">
    <div class="row align-items-start g-5">

      <!-- 左欄：介紹文字 + 統計 + SVG 地圖 -->
      <div class="col-lg-4">
        <h2 class="intro-headline">The Heart of Asia<br>旅行台灣 就是現在</h2>
        <p class="intro-body">
          臺灣因地理資源豐沛，擁有許多特殊地形及奇特的地理景觀。北部的麥北角、北海岸及宜蘭地區，擁有奇異特殊海岸地形，山景水秀、天藍海深；在中南部地區，日月潭的湖光山色、八卦山蠶業，都可充分感受臺灣多元文化及豐富自然景觀。
        </p>
        <p class="intro-body">去著、賞著、體驗的臺灣，熱情歡迎您！</p>

        <!-- 統計數字 -->
        <div class="stats-row">
          <div class="stat-box">
            <span class="stat-num">200+</span>
            <span class="stat-lbl">精選景點</span>
          </div>
          <div class="stat-box">
            <span class="stat-num">22</span>
            <span class="stat-lbl">縣市地區</span>
          </div>
          <div class="stat-box">
            <span class="stat-num">7</span>
            <span class="stat-lbl">景點類型</span>
          </div>
        </div>

        <!-- 台灣地圖（圖片切換版） -->
        <div class="tw-map-wrap">
          <img class="tw-map-img"
               [src]="'assets/img/attraction/' + currentRegion.mapImage"
               [alt]="currentRegion.label">
        </div>
      </div>

      <!-- 右欄：地區 Tabs + 城市卡片 -->
      <div class="col-lg-8">
        <!-- 地區按鈕 -->
        <div class="region-tabs">
          <button *ngFor="let r of regions; let i = index"
                  class="region-btn"
                  [class.active]="activeRegion === i"
                  (click)="selectRegion(i)">
            {{ r.label }}
          </button>
        </div>

        <!-- 地區描述 -->
        <p class="region-desc">{{ currentRegion.description }}</p>

        <!-- 城市卡片格 -->
        <div class="city-grid">
          <div class="city-card"
               *ngFor="let city of currentRegion.cities"
               (click)="goToCity(city)">
            <div class="city-card__img">
              <img [src]="city.imageUrl" [alt]="city.name"
                   onerror="this.src='https://placehold.co/400x260?text=No+Image'">
            </div>
            <div class="city-card__overlay">
              <span class="city-card__name">{{ city.name }}</span>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>
</section>
