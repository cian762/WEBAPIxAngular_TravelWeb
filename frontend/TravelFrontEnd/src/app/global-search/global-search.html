<div class="search-results-wrapper" *ngIf="displayResults.length > 0">
  <div class="section-heading mb-4">
    <h2 class="fw-bold">搜尋結果</h2>
  </div>

  <div class="row g-4">
    <div class="col-md-4" *ngFor="let item of displayResults">
      <div class="card border-0 rounded-4 shadow-sm h-100 overflow-hidden" (click)="goToDetail(item)"
        style="cursor: pointer;">
        <div class="position-relative">
          <img [src]="item.imageUrl" class="card-img-top" style="height: 220px; object-fit: cover;">
          <div class="position-absolute top-0 start-0 m-3">
            <span class="badge bg-white text-dark shadow-sm px-3 py-2 rounded-pill small fw-bold">
              {{ item.category }}
            </span>
          </div>
        </div>
        <div class="card-body p-4">
          <h5 class="card-title fw-bold mb-2">{{ item.title }}</h5>
          <p class="text-muted small mb-0">點擊查看詳細內容...</p>
        </div>
      </div>
    </div>
  </div>
</div>
